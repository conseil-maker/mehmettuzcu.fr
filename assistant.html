<style>
  :root{
    --accent:#1f5673;
    --accent-dark:#163f54;
    --accent-soft:#e8eef2;
    --accent-line:#cfdbe3;
    --bg:#f4f6f8;
    --surface:#ffffff;
    --ink:#1d2733;
    --ink-soft:#54616e;
    --ink-faint:#8a96a3;
    --visitor-bg:#1f5673;
    --visitor-ink:#ffffff;
    --bot-bg:#eef2f5;
    --bot-ink:#1d2733;
    --radius:16px;
    --shadow:0 1px 3px rgba(22,63,84,.08),0 8px 28px rgba(22,63,84,.07);
    --maxw:840px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#eef2f5 0%,#f4f6f8 240px);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .wrap{
    width:100%;
    max-width:var(--maxw);
    margin:0 auto;
    padding:22px 18px 0;
    flex:1;
    display:flex;
    flex-direction:column;
  }
  /* Header */
  header.hero{
    background:var(--surface);
    border:1px solid var(--accent-line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:22px 24px;
    display:flex;
    gap:16px;
    align-items:center;
  }
  .avatar{
    flex:0 0 auto;
    width:54px;height:54px;border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:20px;letter-spacing:.5px;
    box-shadow:0 4px 14px rgba(31,86,115,.35);
  }
  .hero-txt{min-width:0}
  .hero-txt h1{
    margin:0;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.2px;
  }
  .hero-txt .tagline{
    margin:2px 0 0;font-size:13.5px;color:var(--accent);font-weight:600;
  }
  .hero-txt .sub{
    margin:6px 0 0;font-size:13px;color:var(--ink-soft);
  }
  .status-dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:#2ea36b;margin-right:6px;vertical-align:middle;
    box-shadow:0 0 0 3px rgba(46,163,107,.18);
  }
  /* Chat */
  .chat{
    flex:1;
    background:var(--surface);
    border:1px solid var(--accent-line);
    border-top:none;
    border-radius:0 0 var(--radius) var(--radius);
    margin-top:-1px;
    display:flex;
    flex-direction:column;
    min-height:380px;
  }
  .chat-shell{
    background:var(--surface);
    border:1px solid var(--accent-line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    margin-top:16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    flex:1;
  }
  .messages{
    padding:20px 20px 8px;
    overflow-y:auto;
    flex:1;
    display:flex;
    flex-direction:column;
    gap:14px;
    scroll-behavior:smooth;
    max-height:52vh;
  }
  .msg{display:flex;gap:10px;max-width:88%;animation:rise .28s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg .bubble{
    padding:11px 15px;border-radius:14px;font-size:14.5px;
    white-space:pre-wrap;word-wrap:break-word;
  }
  .msg.bot{align-self:flex-start}
  .msg.bot .bubble{background:var(--bot-bg);color:var(--bot-ink);border-bottom-left-radius:4px}
  .msg.visitor{align-self:flex-end;flex-direction:row-reverse}
  .msg.visitor .bubble{background:var(--visitor-bg);color:var(--visitor-ink);border-bottom-right-radius:4px}
  .mini-av{
    flex:0 0 auto;width:28px;height:28px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;margin-top:2px;
  }
  .msg.bot .mini-av{background:var(--accent-soft);color:var(--accent)}
  .msg.visitor .mini-av{background:#dfe6ec;color:var(--ink-soft)}
  .bubble a{color:inherit;text-decoration:underline;text-underline-offset:2px}
  .msg.bot .bubble a{color:var(--accent);font-weight:600}
  /* typing indicator */
  .typing{display:inline-flex;gap:4px;align-items:center;padding:4px 2px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);opacity:.5;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:.9;transform:translateY(-3px)}}
  /* libellé discret « en train d'écrire… » sous les points */
  .typing-label{
    align-self:flex-start;margin:-6px 0 2px 38px;
    font-size:11px;color:var(--ink-faint);font-style:italic;
    letter-spacing:.2px;animation:rise .28s ease both;
  }
  /* Starters */
  .starters{
    padding:4px 18px 14px;
    display:flex;flex-wrap:wrap;gap:8px;
    border-top:1px solid var(--accent-soft);
  }
  .starters .lbl{
    width:100%;font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--ink-faint);font-weight:600;margin:6px 0 2px;
  }
  .chip{
    border:1px solid var(--accent-line);
    background:#fff;color:var(--accent);
    font-size:12.8px;font-weight:600;
    padding:7px 13px;border-radius:999px;cursor:pointer;
    transition:.15s;line-height:1.2;
  }
  .chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px)}
  .chip:active{transform:translateY(0)}
  /* Input */
  .composer{
    display:flex;gap:10px;padding:14px 16px;
    border-top:1px solid var(--accent-line);
    background:#fbfcfd;
  }
  .composer input{
    flex:1;border:1px solid var(--accent-line);border-radius:12px;
    padding:12px 14px;font-size:14.5px;color:var(--ink);
    background:#fff;outline:none;transition:.15s;font-family:inherit;
  }
  .composer input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,86,115,.12)}
  .composer button{
    border:none;background:var(--accent);color:#fff;
    font-weight:600;font-size:14px;padding:0 20px;border-radius:12px;
    cursor:pointer;transition:.15s;font-family:inherit;
    display:flex;align-items:center;gap:7px;
  }
  .composer button:hover{background:var(--accent-dark)}
  .composer button:active{transform:scale(.98)}
  .composer button:disabled{opacity:.5;cursor:default}
  .composer button svg{width:16px;height:16px}
  /* Footer */
  footer{
    text-align:center;font-size:11.5px;color:var(--ink-faint);
    padding:16px 12px 22px;max-width:var(--maxw);margin:0 auto;width:100%;
  }
  footer a{color:var(--accent);text-decoration:none;font-weight:600}
  footer a:hover{text-decoration:underline}
  footer .dot{margin:0 7px;opacity:.5}
  /* Actions discretes (export PDF + effacer) */
  .hero-actions{flex:0 0 auto;margin-left:auto;display:flex;align-items:center}
  .pdf-btn{
    border:1px solid var(--accent-line);background:#fff;color:var(--accent);
    font-family:inherit;font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:999px;cursor:pointer;transition:.15s;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .pdf-btn svg{width:14px;height:14px}
  .pdf-btn:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
  .pdf-btn:active:not(:disabled){transform:scale(.98)}
  .pdf-btn:disabled{opacity:.4;cursor:default}
  .clear-link{
    background:none;border:none;font-family:inherit;font-size:11.5px;
    color:var(--ink-faint);cursor:pointer;padding:0;text-decoration:underline;
    text-underline-offset:2px;transition:.15s;
  }
  .clear-link:hover{color:var(--accent)}
  @media (max-width:560px){
    .pdf-btn span{display:none}
    .pdf-btn{padding:7px 9px}
  }
  /* Scrollbar */
  .messages::-webkit-scrollbar{width:8px}
  .messages::-webkit-scrollbar-thumb{background:var(--accent-line);border-radius:8px}
  .messages::-webkit-scrollbar-thumb:hover{background:#b3c2cd}
  @media (max-width:560px){
    .wrap{padding:14px 11px 0}
    header.hero{padding:16px 16px;gap:12px}
    .avatar{width:46px;height:46px;font-size:17px}
    .hero-txt h1{font-size:17px}
    .hero-txt .tagline{font-size:12.5px}
    .hero-txt .sub{font-size:12px}
    .msg{max-width:94%}
    .messages{max-height:none;padding:16px 14px 6px}
    .composer button span{display:none}
    .composer button{padding:0 15px}
  }
</style>

const KB = {"profile":{"name":"Mehmet TUZCU","tagline":"Un dirigeant qui code — architecte opérationnel France-Turquie","positioning":"Mehmet TUZCU est un architecte opérationnel : un profil-pont rare qui réunit la direction opérationnelle (gestion de PME, finance, RH), la conformité institutionnelle (Qualiopi, CPF/OPCO, RGPD/KVKK) et le développement full-stack IA. Fondateur-développeur de la plateforme EdTech Reflektif, consultant en transformation et opérateur biculturel France-Turquie, il conçoit des systèmes conformes dès leur création (Compliance by Design). Il opère nativement des deux côtés du pont France-Turquie, en faisant le lien entre métiers, réglementation et technologie.","email":"mehmet@reflektif.net","sites":["mehmettuzcu.fr","reflektif.net"],"languages":"Turc (langue maternelle) et français (C1), bilingue et biculturel France-Turquie. Il pilote simultanément les versants francophone et turcophone de ses projets."},"sections":[{"id":"positionnement","title":"Positionnement : l'architecte opérationnel","content":"Mehmet TUZCU se définit comme un architecte opérationnel : un profil-pont rare qui croise trois domaines habituellement séparés — l'opérationnel (gestion de PME, finance, RH), le réglementaire (Qualiopi, CPF/OPCO, RGPD/KVKK) et le technologique (IA générative, SaaS). Son principe directeur est la Compliance by Design : concevoir des systèmes conformes dès leur architecture, pas après coup. Sa proposition de valeur tient en une phrase : faire le lien entre métiers, réglementation et technologie, et opérer nativement des deux côtés du pont France-Turquie."},{"id":"parcours","title":"Parcours : du terrain au full-stack","content":"Trajectoire atypique et résiliente : d'assistant administratif à Directeur Général d'une PME du BTP d'une trentaine de personnes (M&G Habitat, 2017-2023), puis conseil indépendant en transformation (2023), puis Directeur Innovation & Conformité d'une ESN et centre de formation Qualiopi. Arrivé en France à 10 ans sans parler un mot de français et devenu opérationnel jusqu'au niveau C1, il a fait de cette trajectoire une méthode : comprendre la réalité de terrain avant de la traduire en système. Aujourd'hui fondateur-développeur full-stack de Reflektif."},{"id":"reflektif","title":"Reflektif : la plateforme EdTech phare","content":"Reflektif est une plateforme SaaS d'orientation professionnelle augmentée par l'IA, nativement bilingue français/turc, conçue et codée en solo par Mehmet, en production réelle depuis février 2026 et hébergée en Europe (Francfort). Elle propose une orientation scientifiquement fondée en environ 45 minutes là où un bilan classique prend des semaines, avec un moteur algorithmique propriétaire (SmartMatch) qui met en correspondance le profil de l'utilisateur avec un catalogue de 928 métiers. Le parcours complet est en production : tests psychométriques, débriefs IA, rapport de diagnostic, exploration métiers, portail conseiller avec validation humaine et système B2B de cohortes en marque blanche."},{"id":"bilan-easy","title":"Bilan-Easy : Compliance by Design en action","content":"Bilan-Easy est un logiciel SaaS d'IA pour les bilans de compétences, conçu et développé par Mehmet pour un centre Qualiopi, déployé en production et bilingue FR/TR. La conformité y est intégrée nativement : structuration sur les trois phases réglementaires du bilan, suivi post-bilan à 3 et 6 mois conforme au Code du travail, analyse RIASEC automatisée, génération de synthèses PDF, questionnaire de satisfaction Qualiopi et gestion RGPD complète. C'est l'illustration concrète du principe Compliance by Design."},{"id":"netz","title":"Netz Informatique : la mission de transformation","content":"Chez Netz Informatique (ESN et centre de formation Qualiopi à Haguenau), Mehmet occupe en management de transition les fonctions de Responsable Qualité & Conformité et de Directeur Innovation & Développement. Il pilote la conformité institutionnelle, la croissance, l'IA appliquée à la formation et la gestion de crise, selon une philosophie d'automatisation défendable, auditable et utile. Netz a servi de base opérationnelle pour incuber Bilan-Easy, Reflektif et un projet Erasmus, et y obtenir des certifications qualité."},{"id":"conformite","title":"Conformité & Compliance by Design","content":"La conformité réglementaire est au cœur de la pratique de Mehmet : Qualiopi, QualiRepar, CPF/OPCO, RGPD (France), KVKK (Turquie), DPIA, droit du travail et ingénierie de subventions publiques. Dans Reflektif, cette conformité est instrumentée directement dans le code : DPIA réalisée, consentements tracés, droit à l'effacement réellement implémenté, journalisation d'audit et Row-Level Security sur 100 % des tables. Il mène aussi une veille active sur l'AI Act européen, avec une observabilité IA native et un hébergement UE."},{"id":"competences-tech","title":"Compétences techniques","content":"Développeur full-stack autodidacte, Mehmet est l'auteur solo de l'ensemble de ses réalisations numériques, de la conception à la mise en production. Sa stack : TypeScript/React full-stack, tRPC, PostgreSQL/Supabase, IA générative (Vertex AI/Gemini), RAG & embeddings, no-code/low-code, CI/CD et sécurité applicative. Il maîtrise aussi l'architecture SaaS multi-tenant et multi-rôles, et l'automatisation no-code/low-code — toujours sous le principe que chaque automatisation doit être défendable, auditable et utile."},{"id":"pont-france-turquie","title":"Le pont France-Turquie","content":"La biculturalité France-Turquie (langue, réglementation, réseaux) est l'atout transversal de Mehmet : il opère nativement des deux côtés de la frontière. Reflektif s'appuie sur une double implantation juridique — une entité française et une entité turque à Istanbul (Zaim Teknopark) — et un produit nativement conforme RGPD et KVKK. Un protocole d'intention de coopération a été signé avec l'Université Istanbul Sabahattin Zaim en avril 2026. Son bilinguisme turc/français natif ouvre simultanément deux marchés."},{"id":"preuves","title":"Preuves vérifiées","content":"Les chiffres suivants sont vérifiés en base et reflètent la profondeur technique et l'usage produit (distincts du chiffre d'affaires) : Reflektif est une plateforme d'environ 167 000 lignes de code en production, plus de 2 250 commits, 71 tables PostgreSQL toutes protégées par RLS, un catalogue de 928 métiers bilingues FR/TR codés O*NET, et trois assessments psychométriques (RIASEC, Big Five, Valeurs, soit 110 questions). Côté usage : plus de 1 200 utilisateurs, plus de 1 800 passations de tests et 443 batteries complètes. Discipline d'ingénierie : CI/CD complète, chaîne de tests E2E nightly (136 tests), audit QA de plus de 70 pages."},{"id":"methode","title":"Méthode : du besoin métier au système conforme","content":"Mehmet applique une méthode pas-à-pas reproductible : clarifier le problème, cadrer le légal, modéliser l'organisation, outiller, sécuriser la conformité, automatiser. Sa méthodologie de transformation tient en quatre étapes — diagnostic, architecture stratégique, exécution, résultats mesurés. Il se positionne en co-constructeur plutôt qu'en prestataire, raisonne en propriétaire d'actifs sur le long terme, et applique une exigence de vérité documentaire : remplacer les arguments marketing non vérifiables par des formulations honnêtes et défendables."},{"id":"valeurs","title":"Posture & valeurs professionnelles","content":"Justice et intégrité au cœur de la pratique : ne pas mentir, ne pas manipuler, préférer dire une vérité difficile que la taire. Honnêteté commerciale stricte : toujours distinguer l'usage et la traction réels des revenus, ne jamais survendre. Pragmatisme analytique : décider par les données, modéliser des scénarios optimiste/réaliste/pessimiste, puis agir de façon décisive. Dignité et responsabilité : construire des dispositifs propres, crédibles et auditables face aux administrations. Conviction structurante : l'IA augmente le conseiller sans le remplacer."},{"id":"pour-qui","title":"Pour qui : à qui s'adresse Mehmet","content":"Mehmet s'adresse aux partenaires, clients et institutions qui cherchent un profil capable de relier métier, conformité et technologie. Côté conseil en transformation : PME (notamment BTP), centres de formation et structures en quête d'audit, restructuration, mise en conformité Qualiopi ou outillage automatisé. Côté produit : institutions intéressées par l'orientation augmentée par l'IA (universités, acteurs de l'emploi, collectivités), en France comme en Turquie. Il applique une doctrine de sélection exigeante — volonté réelle de transformation et cohérence du discours et des chiffres — selon son principe : je ne travaille pas pour facturer, mais pour transformer."}],"qa":[{"q":"Qui es-tu et que fais-tu ?","a":"Je présente Mehmet TUZCU, un architecte opérationnel : un profil-pont rare qui réunit la direction opérationnelle d'entreprise, la conformité institutionnelle et le développement full-stack IA. Il est fondateur-développeur de la plateforme EdTech Reflektif, consultant en transformation et opérateur biculturel France-Turquie. En une phrase : un dirigeant qui code, qui conçoit des systèmes conformes dès leur création.","tags":["qui","mehmet","mehmet tuzcu","presentation","presente","que fait-il","que fais-tu","positionnement","architecte operationnel"]},{"q":"Quel est ton parcours ?","a":"Une trajectoire atypique et résiliente : d'assistant administratif à Directeur Général d'une PME du BTP d'une trentaine de personnes (2017-2023), puis conseil indépendant en transformation à partir de 2023, puis Directeur Innovation & Conformité d'une ESN et centre de formation Qualiopi. Arrivé en France à 10 ans sans parler français et devenu opérationnel jusqu'au niveau C1, Mehmet a transformé ce parcours en méthode : comprendre le terrain avant de le traduire en système. Aujourd'hui, il est fondateur-développeur full-stack de Reflektif.","tags":["parcours","experience","carriere","trajectoire","histoire"]},{"q":"C'est quoi Reflektif ?","a":"Reflektif est une plateforme SaaS d'orientation professionnelle augmentée par l'IA, nativement bilingue français/turc, conçue et codée en solo par Mehmet, en production depuis février 2026 et hébergée en Europe. Elle propose une orientation scientifiquement fondée en environ 45 minutes là où un bilan classique prend des semaines, grâce à un moteur algorithmique propriétaire qui croise psychométrie (RIASEC, Big Five, Valeurs) et IA générative, et met en correspondance le profil avec un catalogue de 928 métiers. Plus d'infos sur reflektif.net.","tags":["reflektif","produit","plateforme","edtech","orientation","ia"]},{"q":"Tu sais coder ?","a":"Oui. Mehmet est développeur full-stack autodidacte et auteur solo de l'ensemble de ses réalisations numériques, de la conception à la mise en production. Sa stack : TypeScript/React, tRPC, PostgreSQL/Supabase, IA générative (Vertex AI/Gemini), RAG & embeddings, CI/CD. Preuve vérifiée : il a conçu et codé en solo la plateforme Reflektif, soit environ 167 000 lignes de code en production, avec plus de 2 250 commits et une discipline d'ingénierie de niveau équipe (CI/CD complète, tests E2E nightly).","tags":["coder","developpeur","technique","stack","full-stack","code"]},{"q":"Quelle est ta différence, ta singularité ?","a":"La singularité de Mehmet, c'est de croiser trois domaines qui restent d'habitude séparés : l'opérationnel (gestion de PME, finance, RH), le réglementaire (Qualiopi, CPF/OPCO, RGPD/KVKK) et le technologique (IA générative, SaaS). Très peu de gens réunissent la direction opérationnelle, la conformité institutionnelle et le développement full-stack IA dans un même profil. Ajoutez à cela une biculturalité France-Turquie native qui permet d'opérer des deux côtés de la frontière : c'est ce profil-pont qui est rare.","tags":["difference","singularite","unique","atout","force","valeur ajoutee"]},{"q":"Combien de clients avez-vous ? Quel est votre chiffre d'affaires ?","a":"Soyons transparents : Reflektif est aujourd'hui en traction d'usage, pas en revenus. Concrètement, cela veut dire un usage réel et vérifié — plus de 1 200 utilisateurs, plus de 1 800 passations de tests, 443 batteries complètes — mais qui est distinct du chiffre d'affaires, qui n'est pas l'enjeu à ce stade. Mehmet tient à cette distinction par honnêteté : l'usage et la traction ne sont pas des ventes. Pour les détails économiques et le stade exact, le mieux est de le contacter directement à mehmet@reflektif.net.","tags":["clients","chiffre d'affaires","ca","revenus","traction","ventes","business"]},{"q":"Tes preuves, tes chiffres ?","a":"Tous ces chiffres sont vérifiés en base et reflètent la profondeur technique et l'usage produit (distincts du chiffre d'affaires) : environ 167 000 lignes de code en production, plus de 2 250 commits, 71 tables PostgreSQL toutes protégées par Row-Level Security, un catalogue de 928 métiers bilingues codés O*NET, 3 assessments psychométriques (110 questions). Côté usage : plus de 1 200 utilisateurs, plus de 1 800 passations, 443 batteries complètes. Côté qualité : CI/CD complète, tests E2E nightly (136 tests), audit QA de plus de 70 pages.","tags":["preuves","chiffres","metriques","donnees","verifie","traction"]},{"q":"Es-tu disponible pour une mission ?","a":"Mehmet mène des missions de conseil en transformation (audit, restructuration, mise en conformité, réorganisation, outillage et automatisation), avec une doctrine de sélection exigeante : il privilégie les structures qui ont une volonté réelle de transformation et une cohérence entre le discours et les chiffres. Son principe : je ne travaille pas pour facturer, mais pour transformer. Pour discuter d'une mission précise et de sa disponibilité, le mieux est de le contacter directement à mehmet@reflektif.net.","tags":["disponible","mission","collaboration","embauche","freelance","consulting","contact"]},{"q":"Comment te contacter ?","a":"Par e-mail à mehmet@reflektif.net. Vous pouvez aussi consulter ses deux sites : mehmettuzcu.fr (conseil en transformation) et reflektif.net (la plateforme d'orientation par IA). Pour toute demande de mission, de partenariat ou d'information détaillée, l'e-mail est la voie la plus directe.","tags":["contact","email","joindre","coordonnees","site"]},{"q":"Pourquoi France-Turquie ?","a":"Parce que c'est natif chez Mehmet : d'origine turque, arrivé en France à 10 ans, bilingue turc (langue maternelle) et français (C1), il a fait de cette double culture un atout stratégique de pont entre les deux écosystèmes. Concrètement, Reflektif s'appuie sur une double implantation juridique (une entité française et une entité turque à Istanbul, Zaim Teknopark) et un produit nativement conforme RGPD et KVKK. Son bilinguisme natif lui ouvre simultanément les deux marchés et les deux écosystèmes institutionnels.","tags":["france","turquie","biculturel","pont","international","kvkk"]},{"q":"Tu gères la conformité ?","a":"C'est l'un des cœurs de métier de Mehmet, sous le principe de Compliance by Design : concevoir conforme dès l'architecture. Son périmètre : Qualiopi, QualiRepar, CPF/OPCO, RGPD (France), KVKK (Turquie), DPIA, droit du travail et ingénierie de subventions publiques. Dans Reflektif, la conformité est instrumentée directement dans le code (DPIA réalisée, consentements tracés, droit à l'effacement réellement implémenté, journalisation d'audit, RLS sur 100 % des tables). Il mène aussi une veille active sur l'AI Act européen.","tags":["conformite","compliance","rgpd","kvkk","qualiopi","reglementaire","ai act"]},{"q":"Tu travailles seul ?","a":"Sur le plan technique, oui : Mehmet a conçu et codé Reflektif en solo, de bout en bout. Cela dit, Reflektif est portée par un noyau fondateur resserré — Mehmet à la direction produit, technique et pédagogique, et un associé en Turquie — appuyé par un réseau académique turc. Il se positionne d'ailleurs en co-constructeur plus qu'en prestataire dans ses collaborations. Par respect de la confidentialité, je ne nomme pas les tiers ici ; Mehmet peut en parler directement sur demande.","tags":["seul","equipe","associe","solo","collaboration","cofondateur"]},{"q":"C'est quoi Bilan-Easy ?","a":"Bilan-Easy est un logiciel SaaS d'IA pour les bilans de compétences, conçu et développé par Mehmet pour un centre Qualiopi, déployé en production et bilingue FR/TR. La conformité y est intégrée nativement : structuration sur les trois phases réglementaires du bilan, suivi post-bilan à 3 et 6 mois conforme au Code du travail, analyse RIASEC automatisée, génération de synthèses PDF, questionnaire de satisfaction Qualiopi et gestion RGPD complète. C'est une illustration concrète du principe Compliance by Design.","tags":["bilan-easy","bilan de competences","qualiopi","produit","saas"]},{"q":"Quelles technologies utilises-tu ?","a":"La stack de production de Mehmet repose sur des technologies modernes et éprouvées : React/Vite côté front, Node/Express/tRPC côté back, Supabase PostgreSQL hébergé en Europe avec Row-Level Security sur 100 % des tables. Côté IA : Vertex AI EU (Gemini) hébergée en Europe, avec embeddings, RAG et une observabilité IA native. Le tout outillé en CI/CD complète (lint, tests, build, audit, déploiement) avec une chaîne de tests E2E nightly. Il maîtrise aussi l'automatisation no-code/low-code.","tags":["technologies","stack","tech","outils","react","ia","supabase"]},{"q":"Quelle est ta formation ?","a":"BTS Comptabilité et Gestion (Lycée Robert Schuman, Strasbourg, 2011-2013) puis Licence Gestion d'Entreprise (CNAM Alsace, 2013-2014). Côté numérique, il est développeur autodidacte (React, TypeScript, Supabase, IA) et titulaire de la certification TOSA DigiComp 751/1000 (valide 2024-2027), une mesure opposable des compétences numériques. Sa preuve concrète de compétence reste la plateforme Reflektif, environ 167 000 lignes de code conçues et codées en solo.","tags":["formation","diplome","etudes","certification","tosa"]},{"q":"Quelles certifications et labels ?","a":"Côté personnel : certification TOSA DigiComp 751/1000 (valide 2024-2027). Côté structures pilotées : obtention et maintien de la certification Qualiopi du centre de formation de Netz sur plusieurs cycles de renouvellement, et obtention du label QualiRepar. Mehmet a également déposé un dossier de certification professionnelle auprès de France Compétences (ingénierie de certification IA).","tags":["certifications","labels","qualiopi","tosa","qualirepar","france competences"]},{"q":"Sur quels secteurs as-tu travaillé ?","a":"Une adaptabilité sectorielle prouvée : BTP (rénovation énergétique, façades, isolation), IT et formation professionnelle, EdTech IA, immobilier premium (une plateforme de vente multilingue en 8 langues) et développement stratégique en robotique. Mehmet a aussi mené une mission d'analyse de marché international dans le secteur Pharma & Life Sciences. Cette transversalité vient de son parcours opérationnel : il sait passer d'un secteur à l'autre en s'appuyant sur une lecture systémique des organisations.","tags":["secteurs","industries","btp","immobilier","experience","domaines"]},{"q":"Qu'est-ce que la Compliance by Design ?","a":"C'est le principe directeur de Mehmet : concevoir des systèmes conformes dès leur architecture, pas en rajoutant la conformité après coup. Concrètement, dans Reflektif, cela donne une conformité RGPD/KVKK instrumentée directement dans le code — DPIA réalisée, consentements tracés, droit à l'effacement réellement implémenté, journalisation d'audit et Row-Level Security sur 100 % des tables, avec IA et données hébergées en Europe. La conformité devient une propriété native du système, défendable et auditable.","tags":["compliance by design","conformite","methode","architecture","rgpd","principe"]},{"q":"Quelle est ta méthode de travail ?","a":"Une méthode pas-à-pas reproductible : clarifier le problème, cadrer le légal, modéliser l'organisation, outiller, sécuriser la conformité, automatiser. Sa méthodologie de transformation tient en quatre étapes — diagnostic, architecture stratégique, exécution, résultats mesurés. Mehmet se positionne en co-constructeur plutôt qu'en prestataire, raisonne en propriétaire d'actifs sur le long terme, et applique une exigence de vérité documentaire : remplacer les arguments non vérifiables par des formulations honnêtes et défendables.","tags":["methode","methodologie","approche","process","transformation"]},{"q":"Quelles langues parles-tu ?","a":"Mehmet est bilingue et biculturel : turc en langue maternelle et français au niveau C1. Il pilote simultanément les versants francophone et turcophone de ses projets et dialogue avec les écosystèmes institutionnels des deux pays. C'est cette double maîtrise qui rend opérationnel son positionnement de pont France-Turquie.","tags":["langues","bilingue","francais","turc","c1","biculturel"]},{"q":"Quelle est ta vision sur l'IA et l'humain ?","a":"Une conviction structurante chez Mehmet : l'IA augmente le conseiller sans le remplacer. Dans Reflektif, le conseiller reste décisionnaire, avec une validation humaine intégrée au parcours, par refus de l'automatisation déshumanisante. Sa philosophie d'automatisation est claire : chaque automatisation doit être défendable, auditable et utile. L'IA est un outil au service du lien humain, pas un substitut.","tags":["ia","intelligence artificielle","humain","vision","ethique","automatisation"]},{"q":"C'est quoi le projet Erasmus / MEGA ?","a":"Mehmet est l'architecte technique et stratégique du volet IA d'un projet d'orientation professionnelle candidat au programme européen Erasmus+ KA220, porté par un consortium international avec un canal vers le Ministère turc de l'Éducation, et une plateforme adossée à Reflektif. Il a traduit un besoin académique en une architecture technique concrète et réalisable, en se positionnant en propriétaire de la technologie plutôt qu'en simple sous-traitant. C'est l'un des axes de son activité institutionnelle (B2G).","tags":["erasmus","mega","institutionnel","b2g","europe","consortium"]},{"q":"Peux-tu me donner des références clients ou des chiffres financiers ?","a":"Les références clients nominatives et les détails financiers ne sont pas communiqués en vitrine ouverte, par respect de la confidentialité des tiers et par honnêteté (je ne présente jamais un chiffre non vérifié comme acquis). Ces éléments peuvent être partagés au cas par cas, dans le cadre d'un échange qualifié. Le mieux est de contacter Mehmet directement à mehmet@reflektif.net pour en discuter.","tags":["references","clients","financier","confidentiel","due diligence","contact"]},{"q":"As-tu déjà un partenariat institutionnel signé ?","a":"Reflektif a signé un protocole d'intention de coopération avec l'Université Istanbul Sabahattin Zaim (Zaim Teknopark) en avril 2026. Par ailleurs, Mehmet mène une activité institutionnelle (B2G) avec plusieurs prospects et négociations en cours — celles-ci sont à considérer comme de la prospection, pas comme des contrats acquis. Pour le détail du pipeline institutionnel, Mehmet est le mieux placé pour en parler directement.","tags":["partenariat","institutionnel","signe","universite","b2g","prospection"]}],"starters":["Qui est Mehmet et que fait-il ?","C'est quoi Reflektif ?","Quelle est sa singularité par rapport à d'autres profils ?","Est-il disponible pour une mission de conseil ?","Comment gère-t-il la conformité réglementaire ?","Pourquoi un positionnement France-Turquie ?"]};

/* =========================================================================
   MOTEUR DE REPONSE LOCAL — 100% local, aucune dependance, aucune cle.
   Sert de REPLI lorsque l'API /api/chat est indisponible, lente ou vide.
   ========================================================================= */

// Normalisation : minuscules, sans accents, sans ponctuation.
function normalize(s){
  return (s||"")
    .toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")   // retire les accents
    .replace(/[^a-z0-9]+/g," ")                         // ponctuation -> espace
    .replace(/\s+/g," ")
    .trim();
}

// Mots-outils ignores dans le scoring (n'apportent pas de sens).
const STOPWORDS = new Set(("de la le les un une des du au aux et ou a as ai est es " +
  "tu il elle vous nous je tes ton ta ses son sa mes mon ma pour par sur dans en " +
  "que qui quoi quel quelle quels quelles comment pourquoi combien ce cet cette " +
  "ces se s y d l c n m t qu avec sans plus moins tres etre avez avoir fais fait " +
  "faire ne pas the to is").split(" "));

function tokens(s){
  return normalize(s).split(" ").filter(w=>w && !STOPWORDS.has(w) && w.length>1);
}

// Pre-calcul des index de tokens pour la KB.
const QA_INDEX = KB.qa.map(item=>{
  const qTok = tokens(item.q);
  const tagTok = [];
  (item.tags||[]).forEach(t=> tagTok.push(...tokens(t)));
  return {item, qTok:new Set(qTok), tagTok:new Set(tagTok), allTags:item.tags||[]};
});
const SEC_INDEX = KB.sections.map(sec=>{
  return {sec, titleTok:new Set(tokens(sec.title)), bodyTok:new Set(tokens(sec.content))};
});

// Scoring d'une Q/R par recouvrement de tokens (question + tags ponderes).
function scoreQA(qTokens, entry){
  let score=0;
  qTokens.forEach(t=>{
    if(entry.tagTok.has(t)) score += 3;     // un tag matche -> fort signal
    if(entry.qTok.has(t))  score += 2;      // mot present dans la question canonique
  });
  // bonus phrase : un tag multi-mots entierement contenu dans la requete
  const joined = " "+qTokens.join(" ")+" ";
  entry.allTags.forEach(tag=>{
    const nt = normalize(tag);
    if(nt.includes(" ") && joined.includes(" "+nt+" ")) score += 2;
  });
  return score;
}

// Scoring d'une section (titre fortement pondere, corps faiblement).
function scoreSection(qTokens, entry){
  let score=0;
  qTokens.forEach(t=>{
    if(entry.titleTok.has(t)) score += 2;
    if(entry.bodyTok.has(t))  score += 0.6;
  });
  return score;
}

// Seuils : on exige un minimum de pertinence avant de repondre.
const QA_THRESHOLD  = 3;     // au moins un tag fort, ou 2 mots de question
const SEC_THRESHOLD = 2.4;   // au moins ~2 mots du corps + un peu plus

const FALLBACK = "Je n'ai pas cette information en accès public — le mieux est d'écrire à Mehmet : mehmet@reflektif.net.";

// Coeur du moteur local : choisit la meilleure reponse, ou le repli honnete.
function answer(rawQuestion){
  const qTokens = tokens(rawQuestion);
  if(qTokens.length===0) return {text:FALLBACK, source:"fallback"};

  let bestQA=null, bestQAScore=0;
  QA_INDEX.forEach(e=>{
    const s = scoreQA(qTokens, e);
    if(s>bestQAScore){bestQAScore=s; bestQA=e;}
  });

  let bestSec=null, bestSecScore=0;
  SEC_INDEX.forEach(e=>{
    const s = scoreSection(qTokens, e);
    if(s>bestSecScore){bestSecScore=s; bestSec=e;}
  });

  // Priorite a la Q/R (reponse redigee et conversationnelle).
  if(bestQA && bestQAScore>=QA_THRESHOLD){
    return {text:bestQA.item.a, source:"qa"};
  }
  // Sinon, repli sur une section pertinente.
  if(bestSec && bestSecScore>=SEC_THRESHOLD){
    return {text:bestSec.sec.content, source:"section"};
  }
  // Rien d'assez pertinent -> on n'invente jamais.
  return {text:FALLBACK, source:"fallback"};
}

/* =========================================================================
   COUCHE LIVE — APPEL LLM via POST /api/chat (avec repli LOCAL automatique).
   -------------------------------------------------------------------------
   Contrat d'API respecte cote client :
     POST /api/chat
     body  : { message:string, history?:[{role:"user"|"assistant",content}] }
     200   : { answer:string }
   Garde-fous (toute anomalie => repli sur le moteur LOCAL `answer(...)`) :
     - timeout reseau (~12 s) via AbortController ;
     - reponse != 200 ;
     - JSON invalide ;
     - champ `answer` absent ou vide.
   Le navigateur ne detient AUCUNE cle : l'endpoint serveur s'en charge,
   et bascule lui-meme sur {answer:""} / code != 200 en cas d'echec LLM.
   ========================================================================= */
const CHAT_ENDPOINT = "/api/chat";
const LLM_TIMEOUT_MS = 12000;

async function askLLM(question, priorHistory){
  // AbortController : on coupe net au-dela du delai pour ne jamais figer l'UI.
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), LLM_TIMEOUT_MS);
  try{
    const res = await fetch(CHAT_ENDPOINT, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message: question, history: priorHistory || [] }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    if(!res.ok) return null;                          // != 200 -> repli local
    const data = await res.json().catch(()=>null);    // JSON invalide -> repli
    const ans = (data && typeof data.answer === "string") ? data.answer.trim() : "";
    return ans ? ans : null;                          // answer vide -> repli local
  }catch(_e){
    clearTimeout(timer);                              // reseau / timeout -> repli
    return null;
  }
}

/* =========================================================================
   INTERFACE — rendu des bulles, frappe, amorces, saisie.
   ========================================================================= */
const messagesEl = document.getElementById("messages");
const startersEl  = document.getElementById("starters");
const formEl      = document.getElementById("composer");
const inputEl     = document.getElementById("input");
const sendBtn     = document.getElementById("sendBtn");
const pdfBtn      = document.getElementById("pdfBtn");
const clearBtn    = document.getElementById("clearBtn");

// Historique conversationnel transmis a l'API (jamais utilise pour inventer).
const history = [];

/* =========================================================================
   PERSISTANCE — historique {role:'user'|'assistant', text, ts} en localStorage.
   La conversation survit a la fermeture du drawer ET au rechargement de page.
   ========================================================================= */
const STORAGE_KEY = "mt_assistant_chat_v1";

// Tableau source de verite pour la persistance et l'export PDF.
let chatLog = [];

// Lecture defensive : tout JSON corrompu => tableau vide (jamais de plantage).
function loadChatLog(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return [];
    const arr = JSON.parse(raw);
    if(!Array.isArray(arr)) return [];
    return arr.filter(m => m && (m.role==="user"||m.role==="assistant") && typeof m.text==="string");
  }catch(_e){ return []; }
}

// Ecriture defensive : un quota plein ne doit jamais bloquer la conversation.
function saveChatLog(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(chatLog)); }catch(_e){}
}

// Enregistre un message (appele a CHAQUE tour, utilisateur comme assistant).
function recordMessage(role, text){
  chatLog.push({ role, text, ts: Date.now() });
  saveChatLog();
  refreshExportState();
}

// Active/desactive le bouton PDF selon qu'il y a ou non de la matiere.
function refreshExportState(){
  pdfBtn.disabled = chatLog.length === 0;
}

// Echappe le HTML, puis linkifie e-mails et domaines connus (sans risque XSS).
function renderContent(text){
  let safe = String(text)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  safe = safe.replace(/([a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,})/gi,
    '<a href="mailto:$1">$1</a>');
  safe = safe.replace(/\b(reflektif\.net|mehmettuzcu\.fr)\b/gi,
    '<a href="https://$1" target="_blank" rel="noopener">$1</a>');
  return safe;
}

function addBubble(role, contentHTML){
  const wrap = document.createElement("div");
  wrap.className = "msg " + (role==="visitor" ? "visitor" : "bot");
  const av = document.createElement("div");
  av.className = "mini-av";
  av.textContent = role==="visitor" ? "Vous" : "MT";
  av.style.fontSize = role==="visitor" ? "9.5px" : "11px";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = contentHTML;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

function scrollToBottom(){
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// Indicateur "en train d'ecrire" : trois points animes + libelle discret.
function addTyping(){
  const frag = document.createDocumentFragment();
  const wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.innerHTML =
    '<div class="mini-av" style="font-size:11px">MT</div>' +
    '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  const label = document.createElement("div");
  label.className = "typing-label";
  label.textContent = "en train d'écrire…";
  frag.appendChild(wrap);
  frag.appendChild(label);
  messagesEl.appendChild(frag);
  scrollToBottom();
  // Poignee pour retirer les deux noeuds d'un coup.
  return { remove(){ wrap.remove(); label.remove(); } };
}

// Effet de frappe leger (mot par mot, plafonne pour rester fluide).
function typeInto(bubble, fullText){
  return new Promise(resolve=>{
    const html = renderContent(fullText);
    const words = String(fullText).split(" ");
    let i=0;
    bubble.textContent = "";
    const step = ()=>{
      i++;
      bubble.textContent = words.slice(0,i).join(" ");
      scrollToBottom();
      if(i<words.length){
        setTimeout(step, 14);
      } else {
        bubble.innerHTML = html;   // pose les liens cliquables a la fin
        scrollToBottom();
        resolve();
      }
    };
    step();
  });
}

let busy = false;

function setBusy(state){
  busy = state;
  sendBtn.disabled = state;
}

async function handleSend(rawText){
  const q = (rawText||"").trim();
  if(!q || busy) return;
  setBusy(true);
  if(startersEl) startersEl.style.display = "none";   // coherent avec l'etat « conversation »
  addBubble("visitor", renderContent(q));
  inputEl.value = "";

  // Historique transmis a l'API : etat AVANT cette question.
  const priorHistory = history.slice();
  history.push({ role:"user", content:q });
  recordMessage("user", q);   // persistance immediate du tour utilisateur

  const typing = addTyping();

  // 1) On tente D'ABORD le LLM en ligne. 2) Repli LOCAL si echec/timeout/vide.
  //    Le repli est garde par un try/catch : il ne doit JAMAIS planter l'UI.
  let text;
  try{
    const live = await askLLM(q, priorHistory);
    text = (live && live.trim()) ? live.trim() : answer(q).text;
  }catch(_e){
    text = answer(q).text;
  }

  typing.remove();
  const bubble = addBubble("bot", "");
  await typeInto(bubble, text);
  history.push({ role:"assistant", content:text });
  recordMessage("assistant", text);   // persistance du tour assistant
  setBusy(false);
  inputEl.focus();
}

// Amorces cliquables (KB.starters).
KB.starters.forEach(s=>{
  const chip = document.createElement("button");
  chip.type = "button";
  chip.className = "chip";
  chip.textContent = s;
  chip.addEventListener("click", ()=>handleSend(s));
  startersEl.appendChild(chip);
});

// Soumission : bouton + touche Entree.
formEl.addEventListener("submit", e=>{
  e.preventDefault();
  handleSend(inputEl.value);
});

// Texte d'accueil (affiche uniquement quand il n'y a aucun historique).
const WELCOME_TEXT =
  "Bonjour ! Je suis l'assistant public de Mehmet TUZCU — un dirigeant qui code, " +
  "architecte opérationnel France-Turquie et fondateur-développeur de Reflektif.\n\n" +
  "Posez-moi vos questions sur son parcours, Reflektif, ses compétences techniques, " +
  "la conformité ou une éventuelle collaboration. Vous pouvez aussi cliquer sur une " +
  "question suggérée ci-dessous.";

// Affiche l'accueil + laisse les amorces visibles (etat « conversation vide »).
function showWelcome(){
  addBubble("bot", renderContent(WELCOME_TEXT));
  if(startersEl) startersEl.style.display = "";
}

// Rejoue tout l'historique persiste dans l'UI, et reconstruit `history` (API).
function restoreConversation(){
  history.length = 0;
  chatLog.forEach(m=>{
    const role = m.role==="user" ? "visitor" : "bot";
    addBubble(role, renderContent(m.text));
    history.push({ role:(m.role==="user"?"user":"assistant"), content:m.text });
  });
  // On masque les amorces des qu'une vraie conversation existe.
  if(startersEl) startersEl.style.display = "none";
  scrollToBottom();
}

/* =========================================================================
   EXPORT PDF — 100% navigateur, aucune cle, aucun appel reseau.
   Voie principale : jsPDF (texte selectionnable, pagination auto).
   Repli : vue imprimable + window.print() (« Enregistrer en PDF »).
   ========================================================================= */
const PDF_TITLE   = "Conversation avec l'assistant de Mehmet TUZCU";
const PDF_FILENAME = "conversation-mehmet-tuzcu.pdf";

function todayFR(){
  try{
    return new Date().toLocaleDateString("fr-FR",
      { day:"2-digit", month:"long", year:"numeric" });
  }catch(_e){ return new Date().toLocaleDateString(); }
}

function speakerLabel(role){
  return role==="user" ? "Vous : " : "Assistant : ";
}

// Generation jsPDF : titre, date, puis chaque message enveloppe + pagine.
function exportViaJsPDF(){
  const jspdf = window.jspdf;
  if(!jspdf || !jspdf.jsPDF) return false;
  try{
    const doc = new jspdf.jsPDF({ unit:"pt", format:"a4" });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 48;
    const maxW = pageW - margin*2;
    let y = margin;

    const ensureRoom = (lineH)=>{
      if(y + lineH > pageH - margin){ doc.addPage(); y = margin; }
    };

    // Titre.
    doc.setFont("helvetica","bold"); doc.setFontSize(16);
    doc.setTextColor(31,86,115);   // accent #1f5673
    doc.splitTextToSize(PDF_TITLE, maxW).forEach(line=>{
      ensureRoom(20); doc.text(line, margin, y); y += 20;
    });

    // Date du jour.
    doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
    doc.setTextColor(120,120,120);
    ensureRoom(16); doc.text(todayFR(), margin, y); y += 26;

    // Messages.
    chatLog.forEach(m=>{
      const block = speakerLabel(m.role) + (m.text||"");
      doc.setFont("helvetica","normal"); doc.setFontSize(11.5);
      doc.setTextColor(m.role==="user" ? 31 : 29,
                       m.role==="user" ? 86 : 39,
                       m.role==="user" ? 115 : 51);
      const lines = doc.splitTextToSize(block, maxW);
      lines.forEach(line=>{ ensureRoom(15); doc.text(line, margin, y); y += 15; });
      y += 9;   // espace entre les tours
    });

    doc.save(PDF_FILENAME);
    return true;
  }catch(_e){
    return false;
  }
}

// Repli imprimable : on construit une fenetre sobre et on lance window.print().
function exportViaPrint(){
  const esc = s => String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const rows = chatLog.map(m=>
    '<p class="m ' + (m.role==="user"?"u":"a") + '">' +
    '<strong>' + esc(speakerLabel(m.role)) + '</strong>' +
    esc(m.text||"") + '</p>'
  ).join("");
  const html =
    '<!doctype html><html lang="fr"><head><meta charset="utf-8">' +
    '<title>' + esc(PDF_FILENAME) + '</title><style>' +
    'body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1d2733;' +
    'line-height:1.5;max-width:720px;margin:32px auto;padding:0 24px}' +
    'h1{color:#1f5673;font-size:20px;margin:0 0 4px}' +
    '.date{color:#888;font-size:12px;margin:0 0 22px}' +
    '.m{white-space:pre-wrap;margin:0 0 12px;font-size:13px}' +
    '.m.u strong{color:#1f5673}.m.a strong{color:#1d2733}' +
    '@media print{body{margin:0}}' +
    '</style></head><body>' +
    '<h1>' + esc(PDF_TITLE) + '</h1>' +
    '<p class="date">' + esc(todayFR()) + '</p>' +
    rows +
    '<scr'+'ipt>window.onload=function(){window.print();};</scr'+'ipt>' +
    '</body></html>';
  const w = window.open("", "_blank");
  if(!w){
    alert("Veuillez autoriser les fenêtres pop-up pour exporter la conversation.");
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

// Point d'entree export : jsPDF d'abord, repli print si la lib n'a pas charge.
function handleExport(){
  if(chatLog.length === 0) return;
  if(!exportViaJsPDF()){
    exportViaPrint();   // hors-ligne / CDN bloque -> vue imprimable
  }
}

// Efface l'historique : action VOLONTAIRE de l'utilisateur uniquement.
function handleClear(){
  if(chatLog.length === 0) return;
  if(!window.confirm("Effacer définitivement cette conversation ?")) return;
  chatLog = [];
  try{ localStorage.removeItem(STORAGE_KEY); }catch(_e){}
  history.length = 0;
  messagesEl.innerHTML = "";
  refreshExportState();
  showWelcome();
  inputEl.focus();
}

pdfBtn.addEventListener("click", handleExport);
clearBtn.addEventListener("click", handleClear);

// Demarrage : restaure l'historique s'il existe, sinon affiche l'accueil.
window.addEventListener("DOMContentLoaded", ()=>{
  chatLog = loadChatLog();
  refreshExportState();
  if(chatLog.length > 0){
    restoreConversation();
  } else {
    showWelcome();
  }
  inputEl.focus();
});
</script>
